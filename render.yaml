databases:
  - name: bao-gia-db
    plan: free
    databaseName: bao_gia
    region: singapore

services:
  - type: web
    name: bao-gia-api
    runtime: node
    plan: free
    region: singapore
    buildCommand: npm install && npm run build && npm run migration:run
    startCommand: npm run start:prod
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4001"
      - key: DATABASE_URL
        fromDatabase:
          name: bao-gia-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRATION
        value: 7d
      - key: CORS_ORIGIN
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: N8N_SERVICE_KEY
        sync: false
      - key: N8N_WEBHOOK_SECRET
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
